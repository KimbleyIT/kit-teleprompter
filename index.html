<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimbley IT Limited Teleprompter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --text-ui: #cccccc;
    --accent: #f5c518;
    --btn-bg: #2a2a2a;
    --btn-hover: #3a3a3a;
    --btn-active: #f5c518;
    --btn-active-text: #000;
    --scroll-bg: #000;
    --fade-color: #000;
    --line-dim: rgba(255,255,255,0.18);
    --line-active: #f5c518;
    --font-color: #ffffff;
    --script-align: center;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-ui);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 16px;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
    flex-wrap: wrap;
  }

  #header h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--accent);
    white-space: nowrap;
  }

  /* ── Transport controls ── */
  #transport {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button {
    background: var(--btn-bg);
    color: var(--text-ui);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    min-width: 72px;
  }
  button:hover { background: var(--btn-hover); }
  button.active {
    background: var(--btn-active);
    color: var(--btn-active-text);
    border-color: var(--btn-active);
  }

  /* ── Sliders row ── */
  #sliders {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .slider-group {
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .slider-group label {
    font-size: 0.82rem;
    color: var(--text-ui);
    min-width: 64px;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 110px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .val-label {
    font-size: 0.78rem;
    min-width: 30px;
    color: var(--accent);
    text-align: right;
  }

  /* ── Colour + mirror controls ── */
  #extras {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  #extras label {
    font-size: 0.82rem;
  }

  /* ── Header collapse ── */
  #header {
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    max-height: 200px;
  }
  #header.collapsed {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
  }
  #expand-btn {
    display: none;
    position: fixed;
    top: 6px;
    right: 10px;
    z-index: 200;
    min-width: unset;
    padding: 4px 10px;
    font-size: 0.8rem;
    line-height: 1;
    opacity: 0.75;
  }
  #expand-btn:hover { opacity: 1; }
  #collapse-btn {
    min-width: unset;
    padding: 6px 10px;
    font-size: 0.8rem;
    line-height: 1;
  }

  .color-btn {
    min-width: 36px;
    padding: 6px 10px;
    font-size: 0.78rem;
    font-weight: 700;
  }
  .color-btn.white { color: #f5c518; }
  .color-btn.blue  { color: #5bc8f5; }
  .color-btn.green { color: #4caf50; }
  .color-btn.active { background: var(--border); border-color: #666; }

  .align-btn {
    min-width: 36px;
    padding: 6px 10px;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--align-icon-color, #ffffff);
    line-height: 0;
  }
  .align-btn.active { background: var(--border); border-color: #666; }

  /* ── Inline edit overlay ── */
  #edit-overlay {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 10;
    display: flex;
    flex-direction: column;
    padding: 14px;
    gap: 10px;
  }
  #edit-overlay.hidden { display: none; }

  #edit-textarea {
    flex: 1;
    background: #0c0c0c;
    color: #e8e8e8;
    font-family: inherit;
    font-size: 1.05rem;
    line-height: 1.9;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 14px 16px;
    resize: none;
    outline: none;
    overflow-y: auto;
  }
  #edit-textarea:focus { border-color: var(--accent); }

  #edit-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: flex-end;
  }
  #edit-hint {
    font-size: 0.78rem;
    color: #555;
    margin-right: auto;
  }

  /* ── Scroll viewport ── */
  #scroll-viewport {
    flex: 1;
    position: relative;
    background: var(--scroll-bg);
    overflow: hidden;
  }

  /* fade gradients */
  #scroll-viewport::before,
  #scroll-viewport::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 18%;
    pointer-events: none;
    z-index: 2;
  }
  #scroll-viewport::before {
    top: 0;
    background: linear-gradient(to bottom, var(--fade-color) 0%, transparent 100%);
  }
  #scroll-viewport::after {
    bottom: 0;
    background: linear-gradient(to top, var(--fade-color) 0%, transparent 100%);
  }

  /* progress indicator */
  #progress {
    position: absolute;
    bottom: 14px;
    right: 18px;
    z-index: 3;
    font-size: 1.1rem;
    font-weight: 700;
    color: rgba(245, 197, 24, 0.55);
    letter-spacing: 0.03em;
    pointer-events: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
    transition: color 0.3s;
  }
  #progress.done { color: rgba(76, 175, 80, 0.8); }

  /* centre marker */
  #marker {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 20px;
    background: transparent;
    z-index: 3;
    cursor: ns-resize;
    display: flex;
    align-items: center;
  }
  #marker::after {
    content: '';
    display: block;
    width: 100%;
    height: 2px;
    background: var(--marker-color, rgba(245,197,24,0.25));
  }

  /* scrolling content */
  #scroll-content {
    position: absolute;
    left: 0; right: 0;
    padding: 0 8%;
    will-change: transform;
    transition: none;
  }

  /* mirror handled entirely via JS transform */

  .script-line {
    text-align: var(--script-align);
    line-height: 1.6;
    padding: 4px 0;
    color: var(--line-dim);
    transition: color 0.2s;
    white-space: nowrap;   /* prevents browser re-wrapping a formatted line */
  }
  .script-line.spacer { height: 2em; }  /* clear visual gap between sentences */
  .script-line.active { color: var(--line-active) !important; }

  /* ── Empty state message ── */
  #empty-message {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(calc(-100% - 1.8em));
    text-align: center;
    padding: 0 12%;
    color: rgba(255,255,255,0.28);
    font-size: clamp(1rem, 2.2vw, 1.35rem);
    line-height: 1.65;
    pointer-events: none;
    z-index: 1;
  }
  #empty-message.hidden { display: none; }

  /* ── Responsive tablet landscape ── */
  @media (max-width: 900px) {
    #header { padding: 8px 12px; gap: 8px; }
    input[type=range] { width: 90px; }
    button { padding: 8px 12px; font-size: 0.9rem; }
  }

  @media (max-width: 600px) {
    #sliders { gap: 10px; }
    input[type=range] { width: 80px; }
    #header h1 { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<div id="header">
  <h1>Kimbley IT Limited Teleprompter</h1>

  <div id="transport">
    <button id="load-btn"       onclick="enterEditMode()">Load Script</button>
    <button id="edit-btn"       onclick="enterEditMode()">Edit Script</button>
    <button id="play-btn"       onclick="play()">Play</button>
    <button id="pause-btn"      onclick="pause()">Pause</button>
    <button id="reset-btn"      onclick="reset()">Reset</button>
  </div>

  <div id="sliders">
    <div class="slider-group">
      <label>Speed</label>
      <input type="range" id="speed-slider" min="10" max="50" step="0.5" value="12" oninput="updateSpeed(this.value)">
      <span class="val-label" id="speed-val">12</span>
    </div>
    <div class="slider-group">
      <label>Font Size</label>
      <input type="range" id="font-slider" min="18" max="72" value="36" oninput="updateFont(this.value)">
      <span class="val-label" id="font-val">36</span>
    </div>
  </div>

  <div id="extras">
    <span style="font-size:0.82rem">Colour:</span>
    <button class="color-btn white active" onclick="setColor('white', this)">Y</button>
    <button class="color-btn blue"          onclick="setColor('blue',  this)">B</button>
    <button class="color-btn green"         onclick="setColor('green', this)">G</button>
    <button class="align-btn active" onclick="setAlign('center', this)" title="Centre"><svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="0" width="16" height="2" rx="1"/><rect x="2.5" y="5" width="11" height="2" rx="1"/><rect x="0" y="10" width="16" height="2" rx="1"/></svg></button>
    <button class="align-btn"        onclick="setAlign('left',   this)" title="Left"><svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="0" width="16" height="2" rx="1"/><rect x="0" y="5" width="11" height="2" rx="1"/><rect x="0" y="10" width="16" height="2" rx="1"/></svg></button>
    <button class="align-btn"        onclick="setAlign('right',  this)" title="Right"><svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="0" width="16" height="2" rx="1"/><rect x="5" y="5" width="11" height="2" rx="1"/><rect x="0" y="10" width="16" height="2" rx="1"/></svg></button>
    <button id="invert-btn" onclick="toggleTheme()">Invert</button>
    <button id="mirror-btn" onclick="toggleMirror()">Mirror</button>
    <button id="fullscreen-btn" onclick="toggleFullscreen()">Full Screen</button>
    <button id="collapse-btn" onclick="toggleHeader()" title="Hide controls">▲</button>
  </div>
</div>

<button id="expand-btn" onclick="toggleHeader()" title="Show controls">▼</button>

<div id="scroll-viewport">
  <div id="marker"></div>
  <div id="scroll-content"></div>
  <div id="progress">0%</div>
  <div id="empty-message">Ready? Double-click anywhere to load your script.</div>
  <div id="edit-overlay" class="hidden">
    <textarea id="edit-textarea" spellcheck="false" placeholder="Edit your script here…"></textarea>
    <div id="edit-actions">
      <span id="edit-hint">Ctrl+Enter to save &nbsp;·&nbsp; Escape to cancel</span>
      <button id="edit-cancel-btn">Cancel</button>
      <button id="edit-done-btn" style="background:var(--accent);color:#000;border-color:var(--accent)">Done</button>
    </div>
  </div>
</div>


<script>
// ── Responsive font size ──────────────────────────────────────────────────────
// Returns a CSS value that uses the requested px size on wide screens but
// automatically scales down on narrow screens so text never overflows.
// Calibrated so the slider value matches real px at ~1100px viewport width.
function fsize(px) {
  const vw = (px / 1100 * 100).toFixed(2);
  return `min(${px}px, ${vw}vw)`;
}

// ── State ─────────────────────────────────────────────────────────────────────
let lines          = [];   // rendered DOM nodes
let lineOffsets    = [];   // centre-relative offsets of each line
let currentIdx     = 0;
let scrollY        = 0;    // current translateY of scroll-content (px)
let initialScrollY = 0;    // scrollY when first line is at centre marker
let speed          = 12;   // px/s
let running        = false;
let lastTs         = null;
let raf            = null;
let fontSize       = 36;
let fontColor      = '#ffffff';
let mirrored       = false;
let lightTheme     = false;
let markerPct      = 50;
let textAlign      = 'center';

const viewport    = document.getElementById('scroll-viewport');
const content     = document.getElementById('scroll-content');
const speedSlider = document.getElementById('speed-slider');
const fontSlider  = document.getElementById('font-slider');
const speedVal    = document.getElementById('speed-val');
const fontVal     = document.getElementById('font-val');
const playBtn     = document.getElementById('play-btn');
const pauseBtn    = document.getElementById('pause-btn');
const emptyMsg    = document.getElementById('empty-message');

// ── Formatter ─────────────────────────────────────────────────────────────────
// Professional teleprompter standard (BBC / broadcast):
//   • Each sentence is its own visual block, separated by a blank spacer line
//   • Max 7 words per line — short enough to read at a single eye-fixation
//   • Min 3 words per line — no orphan words or two-word fragments
//   • white-space:nowrap in CSS prevents the browser re-wrapping a line on resize
function formatScript(raw) {
  const MAX_WORDS = 7;
  const MIN_WORDS = 3;

  // Collect all sentences from the raw text.
  // Strategy: flatten the text, then split on sentence-ending punctuation
  // (.  !  ?) that is followed by whitespace + a capital letter (or a quote/
  // bracket before the capital). This avoids splitting on URLs like
  // "admin.google.com" where the letter after the period is lowercase.
  const flat = raw.trim().replace(/\r\n|\r/g, '\n').replace(/\n+/g, ' ');

  // Split keeping the delimiter attached to the preceding sentence
  const rawSentences = flat
    .split(/(?<=[.!?]['")\]]*)\s+(?=[A-Z"'(\[])/)
    .map(s => s.trim())
    .filter(s => s.length > 0);

  // If sentence detection produced nothing useful (e.g. all-lowercase script),
  // fall back to splitting on blank lines from the original
  const sentences = rawSentences.length > 0
    ? rawSentences
    : raw.trim().split(/\n\s*\n/).map(s => s.replace(/\s+/g, ' ').trim()).filter(Boolean);

  const result = [];

  sentences.forEach((sentence, si) => {
    if (si > 0) result.push(''); // blank spacer between every sentence

    const words = sentence.split(/\s+/).filter(w => w.length > 0);
    if (words.length === 0) return;

    // Chunk into MAX_WORDS slices
    const chunks = [];
    for (let i = 0; i < words.length; i += MAX_WORDS) {
      chunks.push(words.slice(i, i + MAX_WORDS));
    }

    // If the last chunk is below MIN_WORDS, redistribute evenly with the previous
    // chunk rather than naively appending (which would re-create an over-long line)
    if (chunks.length > 1 && chunks[chunks.length - 1].length < MIN_WORDS) {
      const tail = chunks.pop();
      const prev = chunks.pop();
      const combined = prev.concat(tail);
      const half = Math.ceil(combined.length / 2);
      chunks.push(combined.slice(0, half));
      chunks.push(combined.slice(half));
    }

    chunks.forEach(c => result.push(c.join(' ')));
  });

  return result;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderLines(lineArray) {
  content.innerHTML = '';
  lines = [];
  lineOffsets = [];

  lineArray.forEach(text => {
    const div = document.createElement('div');
    div.className = 'script-line' + (text === '' ? ' spacer' : '');
    div.textContent = text;
    div.style.fontSize = fsize(fontSize);
    div.style.color = text === '' ? 'transparent' : fontColor;
    content.appendChild(div);
    lines.push(div);
  });

  // After paint, compute offsets relative to marker position
  requestAnimationFrame(() => { recalcOffsets(); rewind(); });
}

// ── Marker drag ───────────────────────────────────────────────────────────────
const markerEl = document.getElementById('marker');

function recalcOffsets() {
  const vpH = viewport.offsetHeight;
  const centreY = vpH * (markerPct / 100);
  lineOffsets = lines.map(el => {
    const top = el.offsetTop + el.offsetHeight / 2;
    return top - centreY;
  });
  const firstLineH = lines.length > 0 ? lines[0].offsetHeight : 0;
  initialScrollY = lineOffsets.length > 0 ? -lineOffsets[0] + firstLineH : 0;
}

function applyMarkerPos() {
  markerEl.style.top = markerPct + '%';
}

function onMarkerDrag(e) {
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const rect = viewport.getBoundingClientRect();
  markerPct = Math.max(15, Math.min(85, (clientY - rect.top) / rect.height * 100));
  applyMarkerPos();
  recalcOffsets();
  if (lines.length) setTransform(scrollY);
}

function onMarkerDragEnd() {
  document.removeEventListener('mousemove', onMarkerDrag);
  document.removeEventListener('mouseup',   onMarkerDragEnd);
  document.removeEventListener('touchmove', onMarkerDrag);
  document.removeEventListener('touchend',  onMarkerDragEnd);
  if (lines.length) rewind();
  savePrefs();
}

markerEl.addEventListener('mousedown', e => {
  e.stopPropagation();
  document.addEventListener('mousemove', onMarkerDrag);
  document.addEventListener('mouseup',   onMarkerDragEnd);
});
markerEl.addEventListener('touchstart', e => {
  e.stopPropagation();
  document.addEventListener('touchmove', onMarkerDrag, { passive: true });
  document.addEventListener('touchend',  onMarkerDragEnd);
}, { passive: true });

function applyFontColor() {
  lines.forEach((el, i) => {
    if (!el.classList.contains('spacer')) {
      el.style.color = el.classList.contains('active') ? '' : fontColor;
    }
  });
}

// ── Active line tracking ───────────────────────────────────────────────────────
function updateActiveLine() {
  // The line that's at the centre is the one whose offset ≈ -scrollY
  const target = -scrollY;
  let closest = 0;
  let minDist = Infinity;
  lineOffsets.forEach((off, i) => {
    const d = Math.abs(off - target);
    if (d < minDist) { minDist = d; closest = i; }
  });
  if (closest !== currentIdx) {
    if (lines[currentIdx]) {
      lines[currentIdx].classList.remove('active');
      lines[currentIdx].style.color = fontColor;
    }
    currentIdx = closest;
    if (lines[currentIdx]) {
      lines[currentIdx].classList.add('active');
      lines[currentIdx].style.color = ''; // let CSS .active rule apply
    }
  }
}

// ── Animation loop ────────────────────────────────────────────────────────────
function tick(ts) {
  if (!running) return;
  if (lastTs === null) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.1); // cap at 100ms to avoid jump on tab resume
  lastTs = ts;

  // Speed up through inter-sentence gaps; normal speed on content lines
  const inGap = lines[currentIdx] && lines[currentIdx].classList.contains('spacer');
  const effectiveSpeed = inGap ? Math.min(50, speed + 12) : speed;
  scrollY -= (effectiveSpeed * 3) * dt;

  // Stop at last line
  const minY = lineOffsets.length > 0 ? -(lineOffsets[lineOffsets.length - 1]) : 0;
  if (scrollY < minY) { scrollY = minY; running = false; updateBtnState(); }

  setTransform(scrollY);
  updateActiveLine();
  updateProgress();

  if (running) raf = requestAnimationFrame(tick);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function play() {
  if (running) return;
  running = true;
  lastTs = null;
  updateBtnState();
  raf = requestAnimationFrame(tick);
}

function pause() {
  running = false;
  lastTs = null;
  if (raf) cancelAnimationFrame(raf);
  updateBtnState();
}

const progressEl = document.getElementById('progress');

function updateProgress() {
  const minY = lineOffsets.length > 0 ? -lineOffsets[lineOffsets.length - 1] : initialScrollY;
  const range = initialScrollY - minY;
  const pct = range > 0 ? Math.round((initialScrollY - scrollY) / range * 100) : 0;
  const clamped = Math.max(0, Math.min(100, pct));
  progressEl.textContent = clamped + '%';
  progressEl.classList.toggle('done', clamped >= 100);
}

function setTransform(y) {
  content.style.transform = mirrored ? `translateY(${y}px) scaleX(-1)` : `translateY(${y}px)`;
}

// Rewind to the start of the current script — used internally by renderLines
function rewind() {
  pause();
  scrollY = initialScrollY;
  currentIdx = 0;
  setTransform(scrollY);
  updateProgress();
  lines.forEach((el) => {
    el.classList.remove('active');
    if (!el.classList.contains('spacer')) el.style.color = fontColor;
  });
  if (lines[0]) {
    lines[0].classList.add('active');
    lines[0].style.color = '';
  }
  updateBtnState();
}

// Full reset — triggered by the Reset button
function reset() {
  pause();

  // Reset speed to default
  speed = 12;
  speedSlider.value = speed;
  speedVal.textContent = speed;

  // Reset font size to default
  fontSize = 36;
  fontSlider.value = fontSize;
  fontVal.textContent = fontSize;

  // Clear script from display, textarea, and localStorage
  content.innerHTML = '';
  lines = [];
  lineOffsets = [];
  initialScrollY = 0;
  scrollY = 0;
  currentIdx = 0;
  localStorage.removeItem('kit_script');

  setTransform(0);
  progressEl.textContent = '0%';
  progressEl.classList.remove('done');
  emptyMsg.classList.remove('hidden');
  updateBtnState();
  savePrefs();
}

function updateBtnState() {
  playBtn.classList.toggle('active', running);
  pauseBtn.classList.toggle('active', !running && scrollY < initialScrollY);
}

function updateSpeed(v) {
  speed = +v;
  speedVal.textContent = v;
  savePrefs();
}

function updateFont(v) {
  fontSize = +v;
  fontVal.textContent = v;
  lines.forEach(el => el.style.fontSize = fsize(+v));
  // Recompute offsets after resize
  requestAnimationFrame(() => { recalcOffsets(); });
  savePrefs();
}

// Each mode: font = inactive line colour, active = line-at-marker colour, marker = centre line colour
const colorMap = {
  white: { font: '#ffffff', active: '#f5c518', marker: 'rgba(245,197,24,0.25)'  },
  blue:  { font: '#ffffff', active: '#5bc8f5', marker: 'rgba(91,200,245,0.25)'  },
  green: { font: '#ffffff', active: '#4caf50', marker: 'rgba(76,175,80,0.25)'   },
};
let colorMode = 'white';

function setColor(name, btn) {
  const mode = colorMap[name] || colorMap.white;
  colorMode = name;
  fontColor = lightTheme ? '#111111' : mode.font;
  document.documentElement.style.setProperty('--accent',      mode.active);
  document.documentElement.style.setProperty('--btn-active',  mode.active);
  document.documentElement.style.setProperty('--line-active', mode.active);
  document.documentElement.style.setProperty('--marker-color', mode.marker);
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFontColor();
  savePrefs();
}

function setAlign(val, btn) {
  textAlign = val;
  document.documentElement.style.setProperty('--script-align', val);
  document.querySelectorAll('.align-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  savePrefs();
}

function toggleHeader() {
  const header    = document.getElementById('header');
  const expandBtn = document.getElementById('expand-btn');
  const collapsed = header.classList.toggle('collapsed');
  expandBtn.style.display = collapsed ? 'block' : 'none';
}

function toggleMirror() {
  mirrored = !mirrored;
  document.getElementById('mirror-btn').classList.toggle('active', mirrored);
  setTransform(scrollY);
  savePrefs();
}

// ── Theme (dark / light) ─────────────────────────────────────────────────────
function applyTheme() {
  const r = document.documentElement.style;
  if (lightTheme) {
    r.setProperty('--bg',           '#f0f0f0');
    r.setProperty('--surface',      '#e0e0e0');
    r.setProperty('--border',       '#c0c0c0');
    r.setProperty('--text-ui',      '#222222');
    r.setProperty('--btn-bg',       '#d8d8d8');
    r.setProperty('--btn-hover',    '#c8c8c8');
    r.setProperty('--scroll-bg',    '#ffffff');
    r.setProperty('--fade-color',   '#ffffff');
    r.setProperty('--line-dim',     'rgba(0,0,0,0.30)');
  } else {
    r.setProperty('--bg',           '#0d0d0d');
    r.setProperty('--surface',      '#1a1a1a');
    r.setProperty('--border',       '#2e2e2e');
    r.setProperty('--text-ui',      '#cccccc');
    r.setProperty('--btn-bg',       '#2a2a2a');
    r.setProperty('--btn-hover',    '#3a3a3a');
    r.setProperty('--scroll-bg',    '#000000');
    r.setProperty('--fade-color',   '#000000');
    r.setProperty('--line-dim',     'rgba(255,255,255,0.18)');
  }
  fontColor = lightTheme ? '#111111' : (colorMap[colorMode] ? colorMap[colorMode].font : '#ffffff');
  document.documentElement.style.setProperty('--align-icon-color', lightTheme ? '#111111' : '#ffffff');
  document.getElementById('invert-btn').classList.toggle('active', lightTheme);
  applyFontColor();
}

function toggleTheme() {
  lightTheme = !lightTheme;
  applyTheme();
  savePrefs();
}

// ── Editor panel ──────────────────────────────────────────────────────────────

// ── Persistence ───────────────────────────────────────────────────────────────
function savePrefs() {
  localStorage.setItem('kit_prefs', JSON.stringify({ speed, fontSize, colorMode, mirrored, lightTheme, markerPct, textAlign }));
}

function loadPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem('kit_prefs') || 'null');
    if (!p) return;
    if (p.speed    != null) { speed    = Math.min(50, Math.max(10, p.speed)); speedSlider.value = speed; speedVal.textContent = speed; }
    if (p.fontSize != null) { fontSize = p.fontSize; fontSlider.value  = fontSize; fontVal.textContent   = fontSize; }
    if (p.colorMode && colorMap[p.colorMode]) {
      const mode = colorMap[p.colorMode];
      colorMode = p.colorMode;
      fontColor = mode.font;
      document.documentElement.style.setProperty('--accent',      mode.active);
      document.documentElement.style.setProperty('--btn-active',  mode.active);
      document.documentElement.style.setProperty('--line-active', mode.active);
      document.documentElement.style.setProperty('--marker-color', mode.marker);
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      const btn = document.querySelector(`.color-btn.${colorMode}`);
      if (btn) btn.classList.add('active');
    }
    if (p.mirrored) { mirrored = true; document.getElementById('mirror-btn').classList.add('active'); }
    if (p.lightTheme) { lightTheme = true; applyTheme(); }
    if (p.markerPct != null) { markerPct = p.markerPct; applyMarkerPos(); }
    if (p.textAlign) {
      textAlign = p.textAlign;
      document.documentElement.style.setProperty('--script-align', textAlign);
      document.querySelectorAll('.align-btn').forEach(b => b.classList.remove('active'));
      const alignBtn = document.querySelector(`.align-btn[onclick*="${textAlign}"]`);
      if (alignBtn) alignBtn.classList.add('active');
    }
  } catch(e) {}
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
function nudgeSpeed(delta) {
  speed = Math.min(50, Math.max(10, +(speed + delta).toFixed(1)));
  speedSlider.value = speed;
  speedVal.textContent = speed;
  savePrefs();
}

document.addEventListener('keydown', e => {
  // For INPUT elements, only allow speed nudge via ArrowLeft/Right;
  // block everything else so native slider behaviour still works.
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.target.tagName === 'INPUT') {
    if (e.code === 'ArrowLeft')  { e.preventDefault(); nudgeSpeed(-1); }
    if (e.code === 'ArrowRight') { e.preventDefault(); nudgeSpeed(+1); }
    return;
  }
  switch(e.code) {
    case 'Space':        e.preventDefault(); running ? pause() : play(); break;
    case 'KeyR':         reset(); break;
    case 'ArrowLeft':
    case 'ArrowDown':    e.preventDefault(); nudgeSpeed(-1); break;
    case 'ArrowRight':
    case 'ArrowUp':      e.preventDefault(); nudgeSpeed(+1); break;
    case 'BracketLeft':  fontSize = Math.max(18, fontSize - 2); fontSlider.value = fontSize; fontVal.textContent = fontSize; lines.forEach(el => el.style.fontSize = fsize(fontSize)); savePrefs(); break;
    case 'BracketRight': fontSize = Math.min(72, fontSize + 2); fontSlider.value = fontSize; fontVal.textContent = fontSize; lines.forEach(el => el.style.fontSize = fsize(fontSize)); savePrefs(); break;
    case 'KeyM':         toggleMirror(); break;
    case 'KeyE':         enterEditMode(); break;
  }
});

// ── Click to play / pause (ignore double-clicks) ─────────────────────────────
viewport.addEventListener('click', e => {
  if (e.detail >= 2) return;           // let dblclick handle it
  if (e.target.closest('#edit-overlay')) return; // ignore clicks inside overlay
  running ? pause() : play();
});

// ── Double-click to edit ──────────────────────────────────────────────────────
viewport.addEventListener('dblclick', e => {
  if (e.target.closest('#edit-overlay')) return;
  enterEditMode();
});

// ── Edit overlay ──────────────────────────────────────────────────────────────
const editOverlay  = document.getElementById('edit-overlay');
const editTextarea = document.getElementById('edit-textarea');

function enterEditMode() {
  pause();
  // Reconstruct editable text from current lines
  const raw = lines
    .map(el => el.classList.contains('spacer') ? '' : el.textContent)
    .join('\n')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
  editTextarea.value = raw;
  editOverlay.classList.remove('hidden');
  document.getElementById('edit-btn').classList.add('active');
  requestAnimationFrame(() => editTextarea.focus());
}

function exitEditMode(save) {
  // Always close the overlay first — nothing should keep it stuck open
  editOverlay.classList.add('hidden');
  document.getElementById('edit-btn').classList.remove('active');

  if (save) {
    const raw = editTextarea.value.trim();
    if (raw) {
      try {
        renderLines(formatScript(raw));
        localStorage.setItem('kit_script', raw);
      } catch(err) {
        console.error('exitEditMode render error:', err);
      }
      emptyMsg.classList.add('hidden');
    }
  }
}

document.getElementById('edit-done-btn').addEventListener('click',   e => { e.stopPropagation(); exitEditMode(true);  });
document.getElementById('edit-cancel-btn').addEventListener('click',  e => { e.stopPropagation(); exitEditMode(false); });

editTextarea.addEventListener('keydown', e => {
  if (e.key === 'Escape')                           { e.preventDefault(); exitEditMode(false); }
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); exitEditMode(true);  }
});

// ── Mouse wheel manual scroll ─────────────────────────────────────────────────
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const minY = lineOffsets.length > 0 ? -lineOffsets[lineOffsets.length - 1] : initialScrollY;
  scrollY = Math.max(minY, Math.min(initialScrollY, scrollY - e.deltaY * 0.8));
  setTransform(scrollY);
  updateActiveLine();
  updateProgress();
}, { passive: false });

// ── Fullscreen ────────────────────────────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('fullscreen-btn');
  const active = !!document.fullscreenElement;
  btn.textContent = active ? 'Exit Full' : 'Full Screen';
  btn.classList.toggle('active', active);
});

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  loadPrefs();
  const savedScript = localStorage.getItem('kit_script');
  if (savedScript) {
    emptyMsg.classList.add('hidden');
    renderLines(formatScript(savedScript));
  } else {
    emptyMsg.classList.remove('hidden');
  }
})();
</script>
